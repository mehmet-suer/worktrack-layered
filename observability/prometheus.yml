global:
  scrape_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: worktrack
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['host.docker.internal:8000']
        labels:
          application: worktrack
          environment: local

rule_files:
  - "alerts/*.yml"